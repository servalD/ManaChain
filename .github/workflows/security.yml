# Scan de sécurité Trivy sur tout le repo (dépendances, secrets, misconfigs
# IaC/Docker). Les exclusions justifiées vivent dans .trivyignore (racine).
#
# Le job n'échoue PAS immédiatement : le rapport complet (format tableau) est
# toujours généré et uploadé en artifact, PUIS une étape de gate fait échouer
# le job s'il reste du HIGH/CRITICAL non ignoré.
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # lundi 6h UTC — attrape les CVE publiées entre deux commits
  workflow_dispatch:

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Même scan qu'en local :
      #   trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL .
      # exit-code 1 si findings, mais continue-on-error : on exporte d'abord
      # le rapport, l'échec est prononcé par la dernière étape.
      - name: Scan Trivy
        id: scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: table
          output: trivy-report.txt
          exit-code: "1"

      - name: Rapport dans le log et le résumé du run
        if: always()
        run: |
          cat trivy-report.txt
          { echo '## Rapport Trivy'; echo '```'; cat trivy-report.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Uploader le rapport en artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          retention-days: 30

      # Pas de second scan : on relaie simplement le verdict du scan unique,
      # maintenant que le rapport est exporté.
      - name: Gate — échouer si le scan a trouvé du HIGH/CRITICAL
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::Trivy a détecté des findings HIGH/CRITICAL — voir l'artifact trivy-report"
          exit 1
