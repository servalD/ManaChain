[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.33"
remappings = [
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/"
]
optimizer = true
optimizer_runs = 200
via_ir = true # --ir-minimum
fs_permissions = [{ access = "read-write", path = "./config/" }]

[rpc_endpoints]
base          = "https://mainnet.base.org"
base_sepolia  = "https://sepolia.base.org"
avalanche     = "https://api.avax.network/ext/bc/C/rpc"
fuji          = "https://api.avax-test.network/ext/bc/C/rpc"

[etherscan]
base         = { key = "${ETHERSCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
avalanche = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=43114" }
fuji = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=43113" }
