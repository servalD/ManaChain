# Stack de développement local avec live-reload (back NestJS + Postgres).
#   cp back/.env.dev.example back/.env.dev   # puis ajuster
#   docker compose -f back/docker/docker-compose.dev.yml up
#
# back  → http://localhost:3001  (GET /health, Swagger sur /api/docs)
services:
  back:
    image: node:22-alpine
    container_name: manachain_back_dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm migration:run && pnpm start:dev"
    volumes:
      - ..:/app
      - /app/node_modules
    ports:
      - '3001:3001'
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    env_file:
      - ../.env.dev
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  db:
    image: postgres:16-alpine
    container_name: manachain_db_dev
    env_file:
      - ../.env.dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
