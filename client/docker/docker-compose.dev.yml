# Dev du client Next.js en conteneur, avec hot-reload (le code est monté,
# `pnpm dev` tourne dans le conteneur). Même modèle que back/docker/.
#   cp client/.env.example client/.env   # puis remplir (cf. client/README.md)
#   docker compose -f client/docker/docker-compose.dev.yml up
#
# client → http://localhost:3000
#
# NB : en dev, les NEXT_PUBLIC_* sont lues au démarrage du serveur de dev (pas
# d'inlining figé comme en prod) — le .env local suffit. Les URLs restent en
# `localhost` car elles sont consommées par le NAVIGATEUR, pas par le conteneur.
# Nom de projet explicite : sinon Compose dérive « docker » du nom du dossier,
# le même que back/docker/, et les deux stacks partageraient réseau/projet.
name: manachain-client-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  client:
    image: node:22-alpine
    container_name: manachain_client_dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    env_file:
      - ../.env
    logging: *default-logging
    tty: true
    stdin_open: true

  # Monitoring opt-in : docker compose -f docker/docker-compose.dev.yml --profile monitoring up
  # Mêmes images épinglées que la prod, sans node-exporter ; dashboards/
  # provisioning Grafana réutilisés tels quels (zéro duplication) — seule
  # l'alerte Telegram (fichier .j2, non rendu) n'est pas chargée en dev.
  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ['monitoring']
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2d
    volumes:
      - ../../deploy/monitoring/dev/prometheus-client.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    logging: *default-logging

  grafana:
    image: grafana/grafana:12.2.1
    profiles: ['monitoring']
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
    volumes:
      - ../../deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../deploy/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - '3002:3000'
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    profiles: ['monitoring']
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - '8088:8080'
    logging: *default-logging
