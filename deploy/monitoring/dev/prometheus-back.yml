# Prometheus dev pour back/docker/docker-compose.dev.yml (profil "monitoring").
# Cibles statiques : pas de Swarm ici, back/cadvisor sont déjà résolus par le
# DNS Compose du projet.
global:
  scrape_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: back
    static_configs:
      - targets: ['back:3001']

  - job_name: containers
    static_configs:
      - targets: ['cadvisor:8080']
