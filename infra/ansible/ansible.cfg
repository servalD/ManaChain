[defaults]
inventory = inventory/hosts.ini
host_key_checking = False
interpreter_python = auto_silent
# Sortie YAML via le callback intégré (l'ancien `stdout_callback = yaml` de
# community.general a été supprimé dans leur version 12).
stdout_callback = ansible.builtin.default
callback_result_format = yaml

[ssh_connection]
pipelining = True
# Réessaie les connexions SSH ratées (VM encore en train de booter après un
# terraform apply / cluster-start).
retries = 3
