# Déploiement applicatif sur le cluster Swarm (manager uniquement).
#   ansible-playbook deploy.yml --ask-vault-pass
#   ansible-playbook deploy.yml --ask-vault-pass -e back_image_tag=<sha> -e client_image_tag=<sha>
#
# Prérequis : provision.yml joué, images poussées sur l'ACR, vault.yml chiffré.
# NB : les secrets Swarm sont immuables — pour en changer un : docker stack rm
# manachain, relancer ce playbook, redeployer.
---
- name: Déployer la stack ManaChain
  hosts: manager
  become: true
  vars_files:
    - "{{ inventory_dir }}/tf_outputs.yml"
    - vault.yml

  tasks:
    - name: Créer les dossiers de la stack et des backups
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
      loop:
        - "{{ stack_dir }}"
        - /var/backups/manachain

    - name: Login sur le registre ACR
      community.docker.docker_login:
        registry_url: "{{ acr_login_server }}"
        username: "{{ acr_admin_username }}"
        password: "{{ acr_admin_password }}"
      tags: [migrations]

    - name: Créer les secrets Swarm
      community.docker.docker_secret:
        name: "{{ item.name }}"
        # `default(' ', true)` : un secret Swarm ne peut pas être vide — un
        # espace suffit pour les optionnels non configurés (Resend, Google…).
        data: "{{ item.data | default(' ', true) }}"
        state: present
      loop:
        - { name: database_password, data: "{{ database_password }}" }
        - { name: app_jwt_secret, data: "{{ vault_app_jwt_secret }}" }
        - { name: two_factor_encryption_key, data: "{{ vault_two_factor_encryption_key }}" }
        - { name: resend_api_key, data: "{{ vault_resend_api_key }}" }
        - { name: google_client_secret, data: "{{ vault_google_client_secret }}" }
        - { name: pinata_jwt, data: "{{ vault_pinata_jwt }}" }
        - { name: grafana_admin_password, data: "{{ vault_grafana_admin_password }}" }
        # Rendu sur le nœud de contrôle : jamais écrit en clair sur la VM.
        - { name: rclone_conf, data: "{{ lookup('ansible.builtin.template', '../../deploy/rclone.conf.j2') }}" }
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Rendre le script de backup
      ansible.builtin.template:
        src: ../../deploy/backup.sh.j2
        dest: "{{ stack_dir }}/backup.sh"
        mode: "0755"

    - name: Créer les dossiers de config monitoring
      ansible.builtin.file:
        path: "{{ stack_dir }}/monitoring/{{ item }}"
        state: directory
        mode: "0750"
      loop:
        - grafana/provisioning/datasources
        - grafana/provisioning/dashboards
        - grafana/provisioning/alerting
        - grafana/dashboards

    - name: Rendre la config Prometheus
      ansible.builtin.template:
        src: ../../deploy/monitoring/prometheus.yml.j2
        dest: "{{ stack_dir }}/monitoring/prometheus.yml"
        mode: "0644"
      register: prometheus_config

    # owner 472 = uid grafana dans l'image officielle ; mode 0600 car le
    # fichier rendu contient le token du bot Telegram en clair.
    - name: Rendre l'alerting Grafana (contact point Telegram + règles)
      ansible.builtin.template:
        src: ../../deploy/monitoring/grafana/provisioning/alerting/alerting.yml.j2
        dest: "{{ stack_dir }}/monitoring/grafana/provisioning/alerting/alerting.yml"
        owner: "472"
        mode: "0600"
      register: grafana_alerting_config
      no_log: true

    # copy (jamais template) : les {{ }} des dashboards/datasources Grafana
    # casseraient le rendu Jinja s'ils étaient templés.
    - name: Copier le provisioning Grafana statique (datasource + provider dashboards)
      ansible.builtin.copy:
        src: "../../deploy/monitoring/grafana/provisioning/{{ item }}"
        dest: "{{ stack_dir }}/monitoring/grafana/provisioning/{{ item }}"
        mode: "0644"
      loop:
        - datasources/prometheus.yml
        - dashboards/default.yml
      register: grafana_provisioning_static

    - name: Copier les dashboards Grafana versionnés
      ansible.builtin.copy:
        src: ../../deploy/monitoring/grafana/dashboards/
        dest: "{{ stack_dir }}/monitoring/grafana/dashboards/"
        mode: "0644"
      register: grafana_dashboards

    - name: Rendre la définition de la stack
      ansible.builtin.template:
        src: ../../deploy/stack.yml.j2
        dest: "{{ stack_dir }}/stack.yml"
        mode: "0640"

    # Le mot de passe passe par l'environnement (`-e VAR` sans valeur = héritée
    # du process docker CLI) : jamais dans la ligne de commande ni dans les
    # logs — ce qui permet de NE PAS no_log la tâche et de voir les erreurs.
    # `docker run image:tag` réutilise le cache local même si le tag a bougé
    # côté registre (contrairement à `docker stack deploy`/`service update`,
    # qui résolvent toujours le digest via le registre) — d'où le --pull
    # always, sinon on migre avec une image potentiellement obsolète.
    - name: Jouer les migrations TypeORM (one-shot, avant la bascule)
      ansible.builtin.command: >-
        docker run --rm --pull always
        -e DATABASE_HOST={{ database_host }}
        -e DATABASE_PORT=5432
        -e DATABASE_NAME={{ database_name }}
        -e DATABASE_USER={{ database_user }}
        -e DATABASE_PASSWORD
        -e DATABASE_SSL=true
        {{ acr_login_server }}/manachain-back:{{ back_image_tag }}
        node node_modules/typeorm/cli.js migration:run -d dist/infrastructure/database/typeorm.config.js
      environment:
        DATABASE_PASSWORD: "{{ database_password }}"
      register: migrations
      changed_when: "'No migrations are pending' not in migrations.stdout"
      tags: [migrations]

    - name: Déployer la stack Swarm
      community.docker.docker_stack:
        name: "{{ stack_name }}"
        state: present
        with_registry_auth: true
        compose:
          - "{{ stack_dir }}/stack.yml"

    - name: Backup post-déploiement (aucune fenêtre sans sauvegarde récente)
      ansible.builtin.shell: |
        set -e
        for i in $(seq 1 30); do
          cid=$(docker ps -q -f name={{ stack_name }}_backup | head -1)
          [ -n "$cid" ] && docker exec "$cid" /backup.sh && exit 0
          sleep 5
        done
        echo "service backup indisponible" >&2; exit 1
      register: post_backup
      changed_when: true

    # Garde d'existence : prometheus/grafana n'entrent dans la stack qu'à
    # partir de l'étape qui les ajoute à stack.yml.j2 — sans cette garde, ce
    # commit (configs seules) casserait le déploiement en attendant.
    - name: Services monitoring déjà présents dans la stack ?
      ansible.builtin.command: "docker service ls --filter name={{ stack_name }}_{{ item }} -q"
      loop:
        - prometheus
        - grafana
      register: monitoring_services
      changed_when: false
      loop_control:
        label: "{{ item }}"

    - name: Forcer le redéploiement de prometheus si sa config a changé
      ansible.builtin.command: "docker service update --force {{ stack_name }}_prometheus"
      when:
        - prometheus_config.changed
        - monitoring_services.results[0].stdout | trim != ''
      changed_when: true

    - name: Forcer le redéploiement de grafana si sa config a changé
      ansible.builtin.command: "docker service update --force {{ stack_name }}_grafana"
      when:
        - grafana_alerting_config.changed or grafana_provisioning_static.changed or grafana_dashboards.changed
        - monitoring_services.results[1].stdout | trim != ''
      changed_when: true
